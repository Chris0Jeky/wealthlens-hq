[project]
name = "wealthlens-hq"
version = "0.1.0"
description = "Open-source tools making UK wealth inequality data visible"
requires-python = ">=3.11"
license = "MIT"
readme = "README.md"

[project.optional-dependencies]
dev = [
    "ruff>=0.4",
    "mypy>=1.10",
    "pytest>=8.0",
    "pandas-stubs>=2.1",
    "types-requests>=2.31",
]
pipelines = [
    "requests>=2.31",
    "pandas>=2.1",
    "plotly>=5.18",
    "openpyxl>=3.1",
    "odfpy>=1.4",
]

[tool.setuptools]
packages = []

[tool.ruff]
target-version = "py311"
line-length = 120
src = ["automation", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["wealthlens"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = true

[[tool.mypy.overrides]]
module = ["plotly.*", "odf.*", "openpyxl.*", "requests.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["automation.*"]
disallow_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
