version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/projects/wealthlens-dashboard/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/automation/data-pipelines"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Microsimulator package — deps (numpy/pandas/scipy/pydantic/pyyaml) live only in
  # its own pyproject.toml; the root "/" entry does not recurse into it.
  - package-ecosystem: "pip"
    directory: "/packages/wealthlens-sim"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/projects/wealthlens-dashboard/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
