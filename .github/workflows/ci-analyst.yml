name: CI Analyst

# Hero #1 (projects/wealthlens-analyst) gate — ONE job by design (the plan's
# engineering cap applies to CI too): golden-set schema validation +
# deterministic eval checks, plus the package's own lint/type/test suite so
# scaffolding stubs stay importable and strict-mypy clean.
# RAGAS is intentionally NOT run in CI (model calls cost money; the spend-cap
# story starts with the CI bill).

on:
  push:
    branches: [main]
    paths:
      - "projects/wealthlens-analyst/**"
      - ".github/workflows/ci-analyst.yml"
  pull_request:
    branches: [main]
    paths:
      - "projects/wealthlens-analyst/**"
      - ".github/workflows/ci-analyst.yml"
  # Weekly catch-all: the path-filtered triggers above don't fire while the analyst
  # subtree is idle, so a dependency/stub drift (e.g. a new mypy/numpy release that
  # breaks strict typing — the exact class that reddened ci-sim in session 10) would
  # go unnoticed until the next analyst change. Run weekly regardless of paths,
  # mirroring ci-sim / ci-pipelines.
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-analyst-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyst:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install analyst package (dev extras include jsonschema)
        run: python -m pip install -e "projects/wealthlens-analyst[dev]"

      - name: Lint + type-check (ruff, strict mypy)
        working-directory: projects/wealthlens-analyst
        run: |
          python -m ruff check .
          python -m ruff format --check .
          python -m mypy

      - name: Tests
        working-directory: projects/wealthlens-analyst
        run: python -m pytest -q

      - name: Golden schema validation + deterministic checks
        run: python projects/wealthlens-analyst/evals/checks/deterministic.py
