name: CI Frontend

on:
  push:
    branches: [main]
    paths:
      - "projects/wealthlens-dashboard/frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "projects/wealthlens-dashboard/frontend/**"
      - ".github/workflows/ci-frontend.yml"
  # Weekly catch-all: the path-filtered triggers above don't fire while the frontend
  # is idle, so an eslint/vue-tsc/vitest or npm dependency drift that breaks the
  # frontend lint/typecheck/test/build would go unnoticed until the next frontend
  # change. ci-frontend is the ONLY gate that runs these. Run weekly regardless of
  # paths, mirroring ci-analyst / ci-sim / ci-pipelines.
  schedule:
    - cron: "0 10 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: projects/wealthlens-dashboard/frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: projects/wealthlens-dashboard/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check (prettier)
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Build
        run: npm run build
