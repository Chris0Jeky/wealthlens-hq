name: CI Frontend

on:
  push:
    branches: [main]
    paths:
      - "projects/wealthlens-dashboard/frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "projects/wealthlens-dashboard/frontend/**"
      - ".github/workflows/ci-frontend.yml"

permissions:
  contents: read

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/wealthlens-dashboard/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: projects/wealthlens-dashboard/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm run test
        continue-on-error: true

      - name: Build
        run: npm run build
