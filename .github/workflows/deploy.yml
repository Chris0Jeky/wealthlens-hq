name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: projects/wealthlens-dashboard/frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # --- Python: generate data ---
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install pipeline dependencies
        run: pip install -r automation/data-pipelines/requirements.txt
        working-directory: .

      - name: Run data pipelines (with fallback)
        run: |
          cd automation/data-pipelines
          for script in fetch_*.py; do
            echo "Running $script..."
            python "$script" || echo "  -> fell back to embedded data"
          done
        working-directory: .

      - name: Generate static API JSON
        run: python scripts/generate_static_api.py
        working-directory: .

      # --- Node: build Vue app ---
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: projects/wealthlens-dashboard/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Vue app
        run: npm run build
        env:
          VITE_STATIC_DATA: "true"

      # --- Post-build: add static charts and SPA fallback ---
      - name: Copy static Plotly charts into dist
        run: |
          cp -r ../charts dist/charts

      - name: Create SPA 404 fallback
        run: cp dist/index.html dist/404.html

      # --- Deploy ---
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: projects/wealthlens-dashboard/frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
