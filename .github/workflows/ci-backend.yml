name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - "projects/wealthlens-dashboard/backend/**"
      - "tests/**"
      - "automation/**"
      - "pyproject.toml"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "projects/wealthlens-dashboard/backend/**"
      - "tests/**"
      - "automation/**"
      - "pyproject.toml"
      - ".github/workflows/ci-backend.yml"

permissions:
  contents: read

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            projects/wealthlens-dashboard/backend/requirements.txt
            automation/data-pipelines/requirements.txt

      - name: Install backend dependencies
        run: pip install -r projects/wealthlens-dashboard/backend/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r automation/data-pipelines/requirements.txt

      - name: Install dev tools
        run: |
          pip install ".[dev]"
          pip install "pytest-cov>=6.0"

      - name: Ruff check
        run: |
          ruff check projects/wealthlens-dashboard/backend/
          ruff check automation/
          ruff check tests/

      - name: Mypy
        run: |
          mypy projects/wealthlens-dashboard/backend/
          # TODO: enable once pre-existing type errors in automation/ and tests/ are resolved
          # mypy automation/
          # mypy tests/

      - name: Bandit security scan
        # TODO: remove --exit-zero once baseline findings are triaged
        run: |
          bandit -r projects/wealthlens-dashboard/backend/ -c pyproject.toml --exit-zero
          bandit -r automation/ -c pyproject.toml --exit-zero

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=60
        working-directory: projects/wealthlens-dashboard/backend
