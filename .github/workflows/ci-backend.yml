name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - "projects/wealthlens-dashboard/backend/**"
      - "tests/**"
      - "automation/**"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - "projects/wealthlens-dashboard/backend/**"
      - "tests/**"
      - "automation/**"
      - "pyproject.toml"

permissions:
  contents: read

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            projects/wealthlens-dashboard/backend/requirements.txt
            automation/data-pipelines/requirements.txt

      - name: Install backend dependencies
        run: pip install -r projects/wealthlens-dashboard/backend/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r automation/data-pipelines/requirements.txt

      - name: Install dev tools
        run: pip install ruff mypy pytest pandas-stubs types-requests

      - name: Ruff check
        run: ruff check .

      - name: Mypy
        run: mypy .

      - name: Pytest
        run: pytest -q tests/
        # Some tests depend on CSV files generated by pipeline runs
        continue-on-error: true
