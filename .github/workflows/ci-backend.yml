name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - "projects/wealthlens-dashboard/backend/**"
      - "tests/**"
      - "automation/**"
      - "pyproject.toml"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "projects/wealthlens-dashboard/backend/**"
      - "tests/**"
      - "automation/**"
      - "pyproject.toml"
      - ".github/workflows/ci-backend.yml"
  # Weekly catch-all: the path-filtered triggers above don't fire while the backend
  # is idle, so a dependency/tooling drift (a new ruff/mypy/bandit release, or a
  # fastapi/pydantic bump) that breaks backend lint/type/security/tests would go
  # unnoticed until the next backend change. ci-backend is the ONLY gate that runs
  # mypy backend/, bandit on backend, and the backend pytest+coverage suite. Run
  # weekly regardless of paths, mirroring ci-analyst / ci-sim / ci-pipelines.
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            projects/wealthlens-dashboard/backend/requirements.txt
            automation/data-pipelines/requirements.txt

      - name: Install backend dependencies
        run: pip install -r projects/wealthlens-dashboard/backend/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r automation/data-pipelines/requirements.txt

      - name: Install dev tools
        run: |
          pip install ".[dev]"
          pip install "pytest-cov>=7.1.0"

      - name: Ruff check
        run: |
          ruff check projects/wealthlens-dashboard/backend/
          ruff check automation/
          ruff check tests/

      - name: Mypy
        run: |
          mypy projects/wealthlens-dashboard/backend/
          # automation/ is now type-checked in ci-pipelines.yml (it has the pipeline
          # deps + .[dev] that automation imports need). Only root tests/ remains
          # ungated — it needs an mypy_path config for the backend/pipeline modules
          # its conftest wires onto sys.path at runtime (tracked in tasks/inbox.md).
          # mypy tests/

      - name: Bandit security scan
        run: |
          bandit -r projects/wealthlens-dashboard/backend/ -c pyproject.toml
          bandit -r automation/ -c pyproject.toml

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=60
        working-directory: projects/wealthlens-dashboard/backend
