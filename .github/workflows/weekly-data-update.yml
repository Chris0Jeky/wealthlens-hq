name: Weekly Data Update

# Schedule DISABLED 2026-07-06 under the red-lane law (5 consecutive scheduled
# failures 2026-06-08..07-06; known upstream-fetch breakage accepted per decision
# D-D — the site serves last-good committed data). Manual refresh stays available
# via workflow_dispatch. Re-enable the cron when the post-launch data-maintenance
# task fixes the WAS Table 2.2 / GDHI fetchers. Tracking: #494.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Serialize scheduled runs; never cancel a run mid commit/push.
concurrency:
  group: weekly-data-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r automation/data-pipelines/requirements.txt

      # run_all.py fetches, processes, and validates all datasets in one
      # invocation.  A separate validate step is unnecessary and would be
      # unreachable when the pipeline fails (non-zero exit stops the job).
      - name: Run data pipelines
        env:
          WID_API_KEY: ${{ secrets.WID_API_KEY }}
        run: python automation/data-pipelines/run_all.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet projects/wealthlens-dashboard/charts/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR if data changed
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="data-update/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git add projects/wealthlens-dashboard/charts/
          git add projects/wealthlens-dashboard/data/processed/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "data: weekly pipeline refresh $(date +%Y-%m-%d)"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Data update $(date +%Y-%m-%d)" \
            --body "Automated weekly data pipeline refresh. Review charts for any unexpected changes before merging." \
            --base main
