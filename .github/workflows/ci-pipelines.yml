name: CI Pipelines

# Runs the Python test suites that no other workflow EXECUTES (ci-backend only
# runs backend/tests via its working-directory, and lints — but does not run —
# root tests/ and automation/). This closes the gap that let a stale
# automation/data-pipelines fixture fail invisibly (see PR #352).
#
# Three SEPARATE pytest invocations on purpose: root tests/ and
# automation/data-pipelines/tests/ both contain a test_validate.py, so a single
# run hits pytest's "import file mismatch". Per-directory invocations avoid it
# (do NOT switch to --import-mode=importlib: it silently skips the pipeline copy).
# test_simulator_dashboards.py is intentionally NOT run here — ci-sim.yml already
# covers it (and it needs the editable wealthlens-sim install).

on:
  push:
    branches: [main]
    paths:
      - "tests/**"
      - "automation/**"
      - "projects/wealthlens-dashboard/**"
      - "pyproject.toml"
      - ".github/workflows/ci-pipelines.yml"
  pull_request:
    branches: [main]
    paths:
      - "tests/**"
      - "automation/**"
      - "projects/wealthlens-dashboard/**"
      - "pyproject.toml"
      - ".github/workflows/ci-pipelines.yml"
  # Weekly catch-all: runs regardless of the path filters above, so a new test
  # file or a dependency drift can't slip through unrun (mirrors ci-sim).
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-pipelines-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            projects/wealthlens-dashboard/backend/requirements.txt
            automation/data-pipelines/requirements.txt

      - name: Install backend dependencies
        run: pip install -r projects/wealthlens-dashboard/backend/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r automation/data-pipelines/requirements.txt

      - name: Install dev tools
        run: pip install ".[dev]"

      # Type-check automation/ (data pipelines, og-images, analysis, social-media).
      # ci-backend lints the backend and ci-sim type-checks the sim package, but
      # nothing gated automation/ until now. wealthlens_sim imports resolve to `Any`
      # here (untyped boundary — see the pyproject [tool.mypy] override); the one
      # automation sim consumer is covered at runtime by ci-sim's
      # test_simulator_dashboards.py instead.
      - name: Type-check automation/
        run: python -m mypy automation

      # Root tests/ type-check, a SEPARATE mypy invocation from automation/ on
      # purpose: both dirs contain a `tests` package, so a single `mypy automation
      # tests` aborts with "Duplicate module named tests" (same root cause as the
      # split pytest runs below). mypy_path (pyproject) resolves the hyphenated
      # pipeline/analysis dirs that conftest wires onto sys.path at runtime; app.* is
      # an opaque boundary (checked by ci-backend).
      - name: Type-check tests/
        run: python -m mypy tests

      # Root tests/ (pipeline + API + analysis). conftest.py wires sys.path
      # (automation/analysis, backend, data-pipelines) and seeds CSV fixtures.
      - name: Root test suite
        run: python -m pytest tests/ -q

      # Dashboard tests/ (API smoke; the substantive backend suite lives in
      # backend/tests/ and is executed by ci-backend.yml). Its conftest adds
      # ../backend to sys.path.
      - name: Dashboard test suite
        run: python -m pytest tests/ -q
        working-directory: projects/wealthlens-dashboard

      # Whole pipeline tests dir (so new test files are picked up automatically),
      # EXCEPT test_simulator_dashboards.py which ci-sim.yml already runs (it needs
      # the editable wealthlens-sim install). The hyphenated dir is not importable,
      # so put it on PYTHONPATH (matches the Makefile `pipeline-test` target).
      - name: Data-pipeline tests
        run: >-
          python -m pytest automation/data-pipelines/tests/
          --ignore=automation/data-pipelines/tests/test_simulator_dashboards.py -q
        env:
          PYTHONPATH: automation/data-pipelines
