name: E2E Tests
on:
  pull_request:
    paths:
      - 'projects/wealthlens-dashboard/frontend/**'
  push:
    branches: [main]
    paths:
      - 'projects/wealthlens-dashboard/frontend/**'

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: projects/wealthlens-dashboard/frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: projects/wealthlens-dashboard/frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-report
          path: projects/wealthlens-dashboard/frontend/playwright-report/
          retention-days: 7
