name: E2E Tests
on:
  pull_request:
    paths:
      - 'projects/wealthlens-dashboard/frontend/**'
  push:
    branches: [main]
    paths:
      - 'projects/wealthlens-dashboard/frontend/**'
  # No weekly `schedule:` by design: ci-frontend carries the weekly lint/typecheck/
  # vitest/build drift catch-all, but this Playwright/chromium e2e gate needs a
  # browser install + app build and is heavier/flakier on an idle schedule, so it
  # runs on frontend PR/push only. Add a cron here if scheduled browser-drift coverage
  # is wanted (the trade-off is scheduled chromium-install cost + flakiness).

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: projects/wealthlens-dashboard/frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: projects/wealthlens-dashboard/frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-report
          path: projects/wealthlens-dashboard/frontend/playwright-report/
          retention-days: 7
