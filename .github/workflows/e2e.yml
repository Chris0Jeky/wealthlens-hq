name: E2E Tests
on:
  pull_request:
    paths:
      - 'projects/wealthlens-dashboard/frontend/**'
  push:
    branches: [main]
    paths:
      - 'projects/wealthlens-dashboard/frontend/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/wealthlens-dashboard/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: projects/wealthlens-dashboard/frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: projects/wealthlens-dashboard/frontend/playwright-report/
          retention-days: 7
