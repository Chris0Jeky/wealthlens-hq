name: Lighthouse CI

on:
  push:
    branches: [main]
    paths:
      - "projects/wealthlens-dashboard/frontend/**"
      - ".github/workflows/lighthouse.yml"
  pull_request:
    branches: [main]
    paths:
      - "projects/wealthlens-dashboard/frontend/**"
      - ".github/workflows/lighthouse.yml"
  # No weekly `schedule:` by design: ci-frontend carries the weekly drift catch-all,
  # but this Lighthouse-CI perf/a11y gate needs an app build + headless run and is
  # heavier/noisier on an idle schedule, so it runs on frontend PR/push only. Add a
  # cron here if scheduled Lighthouse-drift coverage is wanted.

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: projects/wealthlens-dashboard/frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: projects/wealthlens-dashboard/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Build + prerender in static-data mode so Lighthouse audits the exact
      # artifact GitHub Pages deploys (baked HTML, ADR 0001).
      - name: Build
        run: npm run build
        env:
          VITE_STATIC_DATA: "true"

      - name: Install chromium for prerender
        run: npx playwright install chromium --with-deps

      - name: Prerender routes
        run: npm run prerender

      - name: Run Lighthouse CI
        run: npm run lighthouse
