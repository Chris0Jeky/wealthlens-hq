[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wealthlens-sim"
version = "0.1.0.dev0"
description = "Open, uncertainty-aware UK wealth-policy microsimulation platform"
readme = "README.md"
license = "AGPL-3.0-or-later"
requires-python = ">=3.11"
authors = [{ name = "Chris", email = "jeky.tck@gmail.com" }]
keywords = ["wealth-tax", "microsimulation", "uk-policy", "inequality"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "numpy>=1.26",
    "pandas>=2.1",
    "scipy>=1.12",
    "pydantic>=2.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=6.0",
    "mypy>=1.8",
    "ruff>=0.4",
    "hypothesis>=6.90",
    "types-PyYAML>=6.0",
]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

# scipy ships no usable type stubs (scipy-stubs is incomplete); silence the
# missing-import error without weakening strictness elsewhere. PyYAML stubs are
# provided by the types-PyYAML dev dependency.
[[tool.mypy.overrides]]
module = ["scipy", "scipy.*"]
ignore_missing_imports = true
follow_untyped_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "tests"]
