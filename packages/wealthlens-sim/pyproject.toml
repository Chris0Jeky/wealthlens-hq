[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wealthlens-sim"
version = "0.1.0.dev0"
description = "Open, uncertainty-aware UK wealth-policy microsimulation platform"
readme = "README.md"
license = "AGPL-3.0-or-later"
requires-python = ">=3.11"
authors = [{ name = "Chris", email = "jeky.tck@gmail.com" }]
keywords = ["wealth-tax", "microsimulation", "uk-policy", "inequality"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "numpy>=1.26",
    "pandas>=2.1",
    "scipy>=1.12",
    "pydantic>=2.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=6.0",
    "mypy>=1.14",
    "ruff>=0.4",
    "hypothesis>=6.90",
    "types-PyYAML>=6.0",
]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

# scipy ships no usable type stubs, so mypy flags its (installed-but-untyped)
# imports as `import-untyped`. follow_untyped_imports makes mypy treat scipy as
# `Any` instead of erroring. It is scoped to scipy only, so the package's own
# code keeps full strict checking; the one scipy call site (top_tail/pareto.py)
# wraps the result in float(). Requires mypy >= 1.14 for this per-module key
# (see the dev-dependency floor). PyYAML stubs come from the types-PyYAML dep.
[[tool.mypy.overrides]]
module = ["scipy", "scipy.*"]
follow_untyped_imports = true

# Bundle the shared repo-root registries/ into the dist via a custom build hook
# (hatch_build.py). The hook conditionally force-includes them only when present,
# so building a wheel from an unpacked sdist (where ../../registries is absent)
# no-ops instead of hard-failing. Registered for both wheel and sdist so the
# sdist is self-contained too.
[tool.hatch.build.targets.wheel.hooks.custom]
path = "hatch_build.py"

[tool.hatch.build.targets.sdist.hooks.custom]
path = "hatch_build.py"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "tests"]
