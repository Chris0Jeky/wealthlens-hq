# WealthLens Source Registry
# Machine-readable catalogue of all data sources
# Schema: id, name, url, api_url (optional), access_date, format, licence, update_pattern, pipeline, notes
# api_url: optional; direct API endpoint when different from the main url
# Optional Hero #1 fields: analyst_corpus (bool; true = part of the FROZEN v1 analyst corpus slice),
#   pdf_url (direct PDF URL when the main url is a landing page)
#
# Every dataset cited in a WealthLens output must have a corresponding entry.
# Populated from existing data pipelines in automation/data-pipelines/.

sources:
  - id: boe-bank-rate-cpi
    name: Bank of England Bank Rate and CPI
    url: https://www.bankofengland.co.uk/boeapps/database/_iadb-fromshowcolumns.asp
    access_date: "2026-05-16"
    format: csv
    licence: OGL-3.0
    update_pattern: monthly
    pipeline: fetch_boe_rates.py
    notes: >
      Series IUDBEDR (Bank Rate) and D7BT (CPI annual rate via ONS).
      Pipeline includes hardcoded fallback if IADB endpoint is unavailable.

  - id: dwp-child-poverty
    name: DWP/HMRC Children in Low Income Families
    url: https://www.gov.uk/government/statistics/children-in-low-income-families-local-area-statistics-2014-to-2023
    access_date: "2026-05-16"
    format: xlsx
    licence: OGL-3.0
    update_pattern: annual
    pipeline: fetch_child_poverty.py
    notes: >
      Percentage of children in relative low income after housing costs by
      UK region. Currently uses hardcoded 2022/23 figures; spreadsheet URL
      changes with each annual release.

  - id: resolution-generational-wealth
    name: Resolution Foundation Intergenerational Audit
    url: https://www.resolutionfoundation.org/publications/
    access_date: "2026-05-16"
    format: report
    licence: CC BY-NC-ND 4.0
    update_pattern: annual
    pipeline: fetch_generational_wealth.py
    notes: >
      Median total household wealth by generation (Baby Boomers, Gen X,
      Millennials) at ages 30, 40, 50, 60 in 2022 real-term GBP. Supplemented
      by ONS Wealth and Assets Survey wave data. Licence corrected from the
      vague "open-publication" to RF's site-wide CC BY-NC-ND 4.0. This entry is
      the derived chart series; the full report lives in the analyst-corpus
      entry rf-intergenerational-audit-2024.

  - id: hmrc-cgt-statistics
    name: HMRC Capital Gains Tax Statistics
    url: https://assets.publishing.service.gov.uk/media/6878ac562bad77c3dae4dcef/Table_2_2025_Size_of_gain.ods
    access_date: "2026-05-16"
    format: ods
    licence: OGL-3.0
    update_pattern: annual
    pipeline: fetch_hmrc_stats.py
    analyst_corpus: true
    notes: >
      Distribution of capital gains by size of gain band. Shows concentration
      among top taxpayers. Also fetches Table 1 (taxpayer counts, total gains,
      tax liabilities). 2025 edition.

  - id: ons-gdhi
    name: ONS Regional Gross Disposable Household Income
    url: https://www.ons.gov.uk/file?uri=/economy/regionalaccounts/grossdisposablehouseholdincome/datasets/regionalgrossdisposablehouseholdincomegdhi/1997to2023/regionalgrossdisposablehouseholdincomeallitlregions2023.xlsx
    access_date: "2026-05-16"
    format: xlsx
    licence: OGL-3.0
    update_pattern: annual
    pipeline: fetch_ons_gdhi.py
    notes: >
      GDHI per head at current prices by ITL3 region. Most recent edition
      covers 1997-2023. Ranges from Westminster (£79,500) to Blackpool
      (£14,200). Fallback URL available for 1997-2022 edition.

  - id: ons-housing-affordability
    name: ONS Housing Affordability in England and Wales
    url: https://www.ons.gov.uk/file?uri=/peoplepopulationandcommunity/housing/datasets/ratioofhousepricetoworkplacebasedearningslowerquartileandmedian/current/aff1ratioofhousepricetoworkplacebasedearnings.xlsx
    access_date: "2026-05-16"
    format: xlsx
    licence: OGL-3.0
    update_pattern: annual
    pipeline: fetch_ons_housing.py
    notes: >
      Median house price to workplace-based earnings ratio by region.
      Covers 1997 onwards. Sheet 1c contains median affordability ratios.

  - id: ons-was-wealth
    name: ONS Wealth and Assets Survey (WAS)
    url: https://www.ons.gov.uk/file?uri=/peoplepopulationandcommunity/personalandhouseholdfinances/incomeandwealth/datasets/totalwealthwealthingreatbritain/july2006tojune2016andapril2014tomarch2022/totalwealthtables.xlsx
    access_date: "2026-05-30"
    format: xlsx
    licence: OGL-3.0
    update_pattern: multi-year-wave
    pipeline: fetch_ons_wealth.py
    analyst_corpus: true
    notes: >
      Total household wealth and components, April 2020 to March 2022.
      Calibration anchors for the synthetic population: Table 2.1 total
      wealth including private pension wealth £13.568tn; Table 2.2 total
      wealth by decile, including top-decile aggregate £5.523tn; bulletin
      main points give median household wealth £293,700, top-decile
      threshold £1,200,500, top-1% threshold £3,121,500, top-1% wealth
      share 10%, and component shares property 40%, pensions 35%,
      financial 14%, physical 10%. January 2025 edition.
      CAVEAT: WAS lost accredited official statistics status June 2025;
      response rate declined to 41%; December 2024 DB pension methodology
      change reduced measured wealth by ~£2.3tn.

  - id: ons-families-households-2022
    name: ONS Families and households in Great Britain, 2022
    url: https://www.ons.gov.uk/peoplepopulationandcommunity/birthsdeathsandmarriages/families/datasets/householdsbytypeofhouseholdandfamilyregionsofenglandandgbconstituentcountries/2022
    access_date: "2026-05-30"
    format: xlsx
    licence: OGL-3.0
    update_pattern: annual
    pipeline: null
    notes: >
      Used as the synthetic-population household grossing and nation-share
      anchor. The 2022 edition reports 23.626m households in England,
      2.542m in Scotland, and 1.332m in Wales (27.5m Great Britain
      households, rounded from thousands). Wealth marginals are from WAS
      Great Britain; v0.1 defaults therefore exclude Northern Ireland until
      NI-specific wealth marginals are wired.

  - id: ons-productivity-pay
    name: ONS Labour Productivity and Average Weekly Earnings
    url: https://www.ons.gov.uk/employmentandlabourmarket/peopleinwork/labourproductivity/timeseries/lzvd/prdy/data
    access_date: "2026-05-16"
    format: json
    licence: OGL-3.0
    update_pattern: annual
    pipeline: fetch_productivity_pay.py
    notes: >
      Productivity (LZVD output per hour) vs real pay (KAB9 AWE deflated
      by L55O CPIH). Both indices normalised to 100 in base year 1997.
      Three ONS time-series endpoints.

  - id: hmrc-tax-receipts
    name: HMRC Tax and NIC Receipts
    url: https://assets.publishing.service.gov.uk/media/67eaee6093e0a7b9eb1e7ae2/HMRC_Tax_and_NIC_Receipts_Monthly_and_Annual_Apr25.xlsx
    access_date: "2026-05-16"
    format: xlsx
    licence: OGL-3.0
    update_pattern: annual
    pipeline: fetch_tax_composition.py
    analyst_corpus: true
    notes: >
      Annual tax receipts by type. Used to compare work taxes (Income Tax +
      NICs) vs wealth taxes (CGT + IHT + SDLT). April 2025 edition.
      Multi-year data from 2018-19 to 2023-24.

  - id: ons-ashe-wages
    name: ONS Annual Survey of Hours and Earnings (ASHE)
    url: https://www.ons.gov.uk/employmentandlabourmarket/peopleinwork/earningsandworkinghours/datasets/ashe1702
    access_date: "2026-05-16"
    format: xlsx
    licence: OGL-3.0
    update_pattern: annual
    pipeline: fetch_wage_stagnation.py
    notes: >
      UK median real weekly earnings (2000-2024) in 2024 CPI-adjusted prices.
      Shows wage stagnation post-2008: 2008 peak £520/week, 2024 £504/week.
      Currently uses hardcoded figures from ASHE Table 1.

  - id: wid-wealth-shares
    name: World Inequality Database (WID.world)
    url: https://wid.world/
    api_url: https://rfap9nitz6.execute-api.eu-west-1.amazonaws.com/prod
    access_date: "2026-05-16"
    format: json
    licence: CC-BY
    update_pattern: periodic
    pipeline: fetch_wid_data.py
    notes: >
      Top 1% and top 10% share of net personal wealth in Great Britain.
      Variables: shweal_p99p100_992_j (top 1%), shweal_p90p100_992_j
      (top 10%). Equal-split adults basis. Historical data from 1820+.

  - id: ons-deaths-registered
    name: ONS Deaths registered in England and Wales (summary tables)
    url: https://www.ons.gov.uk/peoplepopulationandcommunity/birthsdeathsandmarriages/deaths/bulletins/deathsregistrationsummarytables/2023
    access_date: "2026-06-05"
    format: html
    licence: OGL-3.0
    update_pattern: annual
    pipeline: none
    notes: >
      Deaths registered in England and Wales: 581,363 in 2023. Used to derive the
      IHT annual estate-crystallisation rate (deaths / ~27.5m GB households =
      0.0211) that converts the at-death IHT stock into an annual flow. v0.1
      simplification: E&W deaths applied to the GB-scoped synth (understates GB by
      ~10%); per-household not per-estate; uniform not age-specific. See
      docs/IHT_CALIBRATION.md and assumption model.iht.annual_mortality_rate.v1.

  - id: rf-intergenerational-audit-2024
    name: "Resolution Foundation — An intergenerational audit for the UK (2024)"
    url: https://www.resolutionfoundation.org/publications/intergenerational-audit-2024/
    pdf_url: https://www.resolutionfoundation.org/app/uploads/2024/11/Intergenerationl-Audit-2024.pdf
    access_date: "2026-06-11"
    format: report
    licence: CC BY-NC-ND 4.0
    update_pattern: annual-ish (latest edition; no 2025 edition exists as of 2026-06-11)
    pipeline: null
    analyst_corpus: true
    notes: >-
      6th edition (Broome, Hale, Slaughter; DOI 10.63492/po886z; 73pp). Special
      focus: gifts, inheritances, intergenerational transfers. ND licence
      (ENFORCEMENT PENDING H1-18): the answer composer must serve RF spans as
      verbatim quote-with-citation + link to the full report, never
      paraphrase-as-ours; no code enforces this yet, so it is documented here
      as a downstream obligation. PDF URL typo ("Intergenerationl") is real.
      Distinct from the pipeline-fed resolution-generational-wealth entry (that
      is the derived chart series).

  - id: ifs-r188-inheritances-lifecycle
    name: "IFS R188 — Inheritances and inequality over the life cycle (2021)"
    url: https://ifs.org.uk/publications/inheritances-and-inequality-over-life-cycle-what-will-they-mean-younger-generations
    pdf_url: https://ifs.org.uk/sites/default/files/output_url_files/R188-Inheritances-and-inequality-over-the-lifecycle%252520%2525281%252529.pdf
    access_date: "2026-06-11"
    format: report
    licence: CC BY-NC 4.0
    update_pattern: one-off
    pipeline: null
    analyst_corpus: true
    notes: >-
      Bourquin, Joyce, Sturrock (Nuffield-funded; 95pp). Cohort projections of
      inheritance flows and their effect on within/between-generation wealth
      inequality. IFS HTML is Cloudflare-gated; fetch the PDF URL directly.
      The pdf_url is intentionally over-encoded (%252520...); IFS serves the
      file under this exact path (web-verified 2026-06-11) - do NOT urldecode
      before fetching. H1-06 should assert a 200 + application/pdf so a silent
      404 fails loudly rather than ingesting an error page.

  - id: rf-before-the-fall-2025
    name: "Resolution Foundation — Before the fall: the distribution of household wealth in Britain (2025)"
    url: https://www.resolutionfoundation.org/publications/before-the-fall/
    pdf_url: https://www.resolutionfoundation.org/app/uploads/2025/10/Before-the-fall.pdf
    access_date: "2026-06-11"
    format: report
    licence: CC BY-NC-ND 4.0
    update_pattern: series (4th household-wealth audit)
    pipeline: null
    analyst_corpus: true
    notes: >-
      Broome & Kanabar (DOI 10.63492/pcv793; 61pp). Latest comprehensive wealth
      distribution audit on 2020-22 WAS data. ND licence (ENFORCEMENT PENDING
      H1-18): verbatim quote-with-citation only, never paraphrase-as-ours - same
      downstream obligation as rf-intergenerational-audit-2024.

  - id: ifs-green-budget-2023-iht
    name: "IFS — Reforming inheritance tax (Green Budget 2023, ch. 7)"
    url: https://ifs.org.uk/publications/reforming-inheritance-tax
    pdf_url: https://ifs.org.uk/sites/default/files/2023-09/Reforming-inheritance-tax-1.pdf
    access_date: "2026-06-11"
    format: report
    licence: CC BY-NC 4.0
    update_pattern: one-off
    pipeline: null
    analyst_corpus: true
    notes: >-
      Advani & Sturrock (58pp). Wealth-taxation analysis: IHT coverage, revenue
      path, reliefs/avoidance, distributional impact of reform options.

  - id: ifs-deaton-trends-wealth
    name: "IFS Deaton Review — Trends in income and wealth inequalities (OUP 2024)"
    url: https://academic.oup.com/ooec/article/3/Supplement_1/i103/7477701
    pdf_url: https://ifs.org.uk/sites/default/files/2026-03/Trends-in-income-and-wealth-inequalities-IFS-Deaton-Review-of-Inequality-final.pdf
    access_date: "2026-06-11"
    format: report
    licence: CC BY 4.0
    update_pattern: one-off
    pipeline: null
    analyst_corpus: true
    notes: >-
      Bourquin, Brewer, Wernham (DOI 10.1093/ooec/odad100; 135pp). Long-run
      wealth-vs-income inequality framing. CC BY 4.0 applies to the OUP
      published version; cite the OUP article as canonical and ingest the
      IFS-hosted final PDF (old chapter URL redirects).

  - id: hmrc-iht-statistics
    name: HMRC Inheritance Tax Statistics
    url: https://www.gov.uk/government/statistics/inheritance-tax-statistics
    access_date: "2026-05-16"
    format: ods
    licence: OGL-3.0
    update_pattern: annual
    pipeline: null
    notes: >
      Backs the inheritance-tax dashboard chart and its freshness entry
      (2021-22 edition). Table 12.1 - Estates notified to HMRC and liable to
      IHT, plus tax paid by estate-size band. Hand-curated chart values (no
      fetch pipeline); source/url/access_date match the chart's own meta block
      and freshness.json. Crown copyright under the Open Government Licence v3.0.
