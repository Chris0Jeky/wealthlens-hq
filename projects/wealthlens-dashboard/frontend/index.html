<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="WealthLens UK — open-source, source-backed data on wealth inequality in the United Kingdom."
    />
    <meta name="theme-color" content="#C8161D" />

    <!-- Open Graph — og:url and og:image must be absolute in production -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wealthlens.uk/" />
    <meta property="og:title" content="WealthLens UK — Wealth Inequality Dashboard" />
    <meta
      property="og:description"
      content="Open-source, source-backed data on wealth inequality in the United Kingdom. Every chart cites its data source."
    />
    <meta property="og:image" content="/og/og-landing.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="WealthLens UK — UK Wealth Inequality. 57% of wealth held by top 10%. Data from ONS, WID, HMRC." />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:site_name" content="WealthLens UK" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="WealthLens UK — Wealth Inequality Dashboard" />
    <meta
      name="twitter:description"
      content="Open-source, source-backed data on wealth inequality in the United Kingdom."
    />
    <meta name="twitter:image" content="/og/og-landing.png" />
    <meta name="twitter:image:alt" content="WealthLens UK — UK Wealth Inequality. 57% of wealth held by top 10%." />

    <link rel="canonical" href="https://wealthlens.uk/" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>WealthLens UK</title>


    <!-- Google Fonts: Newsreader (serif), IBM Plex Sans, IBM Plex Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,500;1,6..72,600&display=swap" rel="stylesheet">
    <script>
      ;(function(){var s=localStorage.getItem('theme');if(s==='dark'||(! s&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')})()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
