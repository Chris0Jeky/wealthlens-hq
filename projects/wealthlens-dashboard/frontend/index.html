<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#C8161D" />

    <!-- Per-page meta (description, canonical, og:*, twitter:*) is owned by
         src/composables/usePageMeta.ts and baked in at build time by the
         prerender (ADR 0001). Do not add per-page tags here — they would
         duplicate and drift. Only route-invariant tags belong in this file. -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/wealthlens-hq/icons/icon-192.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="WealthLens UK" />
    <title>WealthLens UK</title>
    <link rel="manifest" href="/wealthlens-hq/manifest.json" />

    <!-- Google Fonts: Newsreader (serif), IBM Plex Sans, IBM Plex Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,500;1,6..72,600&display=swap"
      rel="stylesheet"
    />
    <script>
      ;(function () {
        // try/catch: inside a sandboxed iframe (the /embed snippet has no
        // allow-same-origin) localStorage access throws SecurityError.
        try {
          var s = localStorage.getItem("theme")
          if (s === "dark" || (!s && window.matchMedia("(prefers-color-scheme:dark)").matches))
            document.documentElement.classList.add("dark")
        } catch (e) {
          /* no storage — embed sandbox; default theme applies */
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
