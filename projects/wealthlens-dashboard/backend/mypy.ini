# Backend mypy configuration.
#
# mypy does NOT walk up to the repo-root pyproject.toml when invoked from this
# directory (unlike ruff, which does), so `make backend-lint` -> `mypy .` would
# otherwise run on mypy's permissive defaults: check_untyped_defs OFF and
# warn_return_any OFF, i.e. function bodies of untyped defs go unchecked and an
# accidental `Any` leak is silent. These settings mirror the root [tool.mypy]
# strictness so the FastAPI backend gets the same type rigor as the rest of the
# repo. Verified to surface zero new errors on the current backend.
[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True
